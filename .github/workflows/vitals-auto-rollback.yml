name: VITALS with Auto-Rollback

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  checks: write
  deployments: write

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.example.com
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to Staging
        run: |
          echo "Deploying to staging..."
          if [[ -x "./deploy.sh" ]]; then
            ./deploy.sh staging
          else
            echo "deploy.sh not found; running no-op staging deployment placeholder"
          fi
      
      - name: Wait for Metrics
        run: sleep 60  # Wait for metrics to stabilize
  
  vitals-check:
    needs: deploy-staging
    runs-on: ubuntu-latest
    outputs:
      rollback: ${{ steps.rollback.outputs.needed }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for Local Action
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Local VITALS Action
        run: |
          cd .github/actions/vitals
          npm install
          npm run build

      - name: VITALS Regression Check
        id: vitals
        uses: ./.github/actions/vitals
        with:
          prometheus-url: https://prometheus.demo.do.prometheus.io:9090
          mode: regress
          baseline: 'prod-baseline'
          candidate: 'staging-${{ github.sha }}'
          config: 'vitals.yaml'
          comment-pr: 'false'
      
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitals-results
          path: vitals-results/
      
      - name: Set Rollback Flag
        id: rollback
        run: |
          if [[ "${{ steps.vitals.outputs.verdict }}" == "FAIL" ]]; then
            echo "needed=true" >> $GITHUB_OUTPUT
          else
            echo "needed=false" >> $GITHUB_OUTPUT
          fi
  
  rollback:
    needs: vitals-check
    if: needs.vitals-check.outputs.rollback == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Rollback Deployment
        run: |
          echo "Performance regression detected, rolling back..."
          if [[ -x "./rollback.sh" ]]; then
            ./rollback.sh staging
          else
            echo "rollback.sh not found; no-op rollback placeholder"
          fi
      
      - name: Create Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Performance regression detected in ${context.sha}`,
              body: `Automatic rollback triggered due to performance regression.\n\nSee workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['performance', 'regression', 'auto-rollback']
            });
  
  deploy-production:
    needs: vitals-check
    if: needs.vitals-check.outputs.rollback == 'false'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://example.com
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to Production
        run: |
          echo "No regressions detected, deploying to production..."
          if [[ -x "./deploy.sh" ]]; then
            ./deploy.sh production
          else
            echo "deploy.sh not found; running no-op production deployment placeholder"
          fi
